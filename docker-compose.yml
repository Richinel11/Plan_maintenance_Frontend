version: '3.8'

services:
  eneoplan-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL du backend Django — modifier selon l'environnement
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: eneoplan-frontend:latest
    container_name: eneoplan-frontend
    ports:
      - "3000:80"   # Accessible sur http://localhost:3000
    restart: unless-stopped
